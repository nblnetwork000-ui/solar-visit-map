  <body class="diagnosis-page">
    <header class="site-header"><a class="brand text-brand" href="./index.html"><span>L.EVER</span><small>Inc</small></a><button class="menu-toggle" type="button" aria-label="メニューを開く" aria-controls="site-menu" aria-expanded="false"><span></span><span></span><span></span></button><nav class="nav-tabs" id="site-menu" aria-label="主要ナビゲーション"><a href="./index.html">TOP</a><a href="./service.html">サービス概要</a><a href="./diagnosis.html" aria-current="page">無料診断</a><a href="./target.html">導入対象</a><a href="./cases.html">実績</a><a href="./ai-services.html">その他AIサービス</a><a href="./company.html">会社概要</a></nav><div class="header-actions"><a class="button primary" href="./diagnosis.html">無料診断を申し込む →</a></div></header><div class="menu-backdrop" aria-hidden="true"></div>
    <main>
      <section class="page-hero diagnosis-visual"><div class="page-hero-inner"><h1>無料診断の<br>お申し込み</h1><p class="lead">ご入力いただいた内容をもとに、貴社の状況を分析し、無料診断の詳細をメールにてお送りします。</p><p>※同業他社様からのお申し込みはご遠慮いただいております。</p></div></section>
      <section class="section soft">
        <form class="contact-form" aria-label="無料診断フォーム">
          <label>会社名<input type="text" name="company" autocomplete="organization" placeholder="例）株式会社L.EVER" required /></label>
          <label>担当者名<input type="text" name="name" autocomplete="name" placeholder="例）山田 太郎" required /></label>
          <label>メールアドレス<input type="email" name="email" autocomplete="email" placeholder="例）info@lever.jp" required /></label>
          <label>電話番号<input type="tel" name="tel" autocomplete="tel" placeholder="例）0120-399-137" /></label>
          <label>大業種<select id="major-industry" name="major_industry" required><option value="">選択してください</option></select></label>
          <label>小業種<select id="minor-industry" name="minor_industry" disabled><option value="">大業種を選択してください</option></select></label>
          <label class="wide">ご質問・ご要望など<textarea name="message" placeholder="現在の課題や相談したい内容をご記入ください"></textarea></label>
          <div class="form-actions"><button class="button primary" type="submit">送信する →</button><a class="button line" href="https://lin.ee/8pWnGcU" target="_blank" rel="noopener">公式LINEで問い合わせる</a></div>
          <p class="form-note">ご入力いただいた個人情報は、当社のプライバシーポリシーに基づき適切に管理いたします。</p>
        </form>
      </section>
    </main>
