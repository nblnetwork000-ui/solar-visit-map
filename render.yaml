services:
  - type: web
    name: solar-visit-map
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: HOST
        value: 0.0.0.0
      - key: ALLOW_REMOTE_ACCESS
        value: true
      - key: REQUESTS_PER_15_MIN
        value: 300
      - key: SHARE_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_MAPS_BROWSER_KEY
        sync: false
      - key: LINE_CHANNEL_ID
        value: 2010401153
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_HOMEPAGE_URL
        sync: false
      - key: LINE_DIAGNOSIS_URL
        sync: false
      - key: LINE_SERVICE_URL
        sync: false
      - key: LINE_EVIDENCE_URL
        sync: false
      - key: LINE_CONSULTATION_URL
        sync: false
      - key: LINE_SUPPLEMENT_URL
        sync: false
